name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon; produces a proper Squirrel.app bundle
            rid: osx-arm64
            exe: Squirrel
            icon: src/Squirrel.App/Assets/squirrel.icns
          - os: windows-latest
            rid: win-x64
            exe: Squirrel.exe
            icon: src/Squirrel.App/Assets/squirrel.ico
          - os: ubuntu-latest
            rid: linux-x64
            exe: Squirrel
            icon: src/Squirrel.App/Assets/squirrel.png
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Get version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Publish
        shell: bash
        run: >
          dotnet publish src/Squirrel.App -c Release -r ${{ matrix.rid }}
          --self-contained -o publish/${{ matrix.rid }}

      - name: Install Velopack CLI
        shell: bash
        run: dotnet tool install -g vpk

      - name: Pack installer
        shell: bash
        run: >
          vpk pack
          --packId Squirrel
          --packTitle Squirrel
          --packVersion "$VERSION"
          --packDir publish/${{ matrix.rid }}
          --mainExe ${{ matrix.exe }}
          --icon ${{ matrix.icon }}

      - name: Upload to GitHub Release
        shell: bash
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --publish
          --releaseName "Squirrel $VERSION"
          --tag ${{ github.ref_name }}
          --merge
